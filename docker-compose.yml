services:
  selenoid:
    image: aerokube/selenoid:1.11.3
    container_name: selenoid
    environment:
      DOCKER_API_VERSION: "1.45"
    ports:
      - "4444:4444"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./selenoid:/etc/selenoid:ro
    command:
      - "-conf"
      - "/etc/selenoid/browsers.json"
      - "-container-network"
      - "selenoid"
    networks:
      - selenoid

  selenoid-ui:
    image: aerokube/selenoid-ui:latest-release
    container_name: selenoid-ui
    depends_on:
      - selenoid
    ports:
      - "8081:8080"
    command:
      - "--selenoid-uri"
      - "http://selenoid:4444"
    networks:
      - selenoid

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - selenoid

  tests:
    build: .
    container_name: python-qa-tests
    working_dir: /app
    volumes:
      - .:/app
    networks:
      - selenoid
    depends_on:
      - selenoid

networks:
  selenoid:
    name: selenoid

volumes:
  jenkins_home: